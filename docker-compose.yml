services:
  database:
    image: postgres:latest
    container_name: habitat-database
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: habitat
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "habitat"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: ./app
    container_name: habitat-api
    ports:
      - "8080:8080"
    volumes:
      - ~/.m2:/root/.m2
    working_dir: /app
    command: sh -c "chmod +x mvnw && ./mvnw spring-boot:run"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://habitat-database:5432/habitat
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      API_SECRET_TOKEN: ${API_SECRET_TOKEN}
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app
          ignore:
            - target/
        - action: rebuild
          path: ./app/pom.xml
    depends_on:
      database:
        condition: service_healthy